name: Winlator APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
         sudo apt-get update
         sudo apt-get install -y libgl1 libglu1-mesa libc6 lib32z1

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'cmake;3.22.1'

      - name: Fix ALL duplicate native libs
        run: |
          find . -name "build.gradle" -exec sed -i '/android {/a \    packagingOptions { jniLibs { pickFirsts += ["lib/arm64-v8a/*.so"] } }' {} +
          echo "Fixed all .so duplicate issues"
      
      - name: "List files"
        run: |
          ls -la app/src/main/assets
          
      - name: "Get Short SHA"
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build APK
        run: |
          GRADLEW_PATH=$(find . -name gradlew | head -n 1)
          PROJECT_ROOT=$(dirname "$GRADLEW_PATH")
          cd "$PROJECT_ROOT"
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Winlator-debug apk
          path: app/build/outputs/apk/debug/*.apk

      - name: "Create Release"
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          name: "winlator_glibc_debug"
          tag_name: v${{ env.SHORT_SHA }}
          prerelease: false
          files: ./app/build/outputs/apk/debug/app-debug.apk
